name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff "black>=24.0" mypy
      - run: ruff check hermes_screener/ tests/
      - run: black --check --target-version py312 hermes_screener/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install pydantic pydantic-settings structlog prometheus-client rich pytest httpx fastapi uvicorn
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pydantic pydantic-settings structlog prometheus-client rich mypy types-requests
      - run: mypy hermes_screener/ --ignore-missing-imports
