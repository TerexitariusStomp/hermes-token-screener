<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tokens — Hermes Screener</title>
<link rel="stylesheet" href="style.css">
</head><body>
<nav>
<div class="logo">HERMES <span>&#9670;</span> SCREENER</div>
<div class="nav">
  <a href="index.html" class="active">Tokens</a>
  <a href="wallets.html">Smart Money</a>
  <a href="cross-tokens.html">Tokens×Wallets</a>
  <a href="cross-wallets.html">Wallets×Tokens</a>
  <a href="columns.html">Guide</a>
  <a href="https://github.com/TerexitariusStomp/hermes-token-screener">GitHub</a>
</div></nav>
<div class="wrap">
<h1>Token Leaderboard</h1>
<div class="sub">Top tokens from the Hermes enrichment pipeline</div>
<div id="loading">Loading data from GitHub Pages...</div>
<div class="tbl" id="table-container" style="display:none"><table>
<thead><tr><th>#</th><th>Token</th><th>Chain</th><th>Address</th><th>Score</th><th>Ch</th><th>FDV</th><th>Vol24h</th><th>Vol1h</th><th>1h</th><th>6h</th><th>Age</th><th>🧠</th><th>Signals</th></tr></thead>
<tbody id="tbody"></tbody>
</table></div>
</div>
<div class="updated" id="updated"></div>
<script>
function fmt_usd(v){if(!v)return"—";v=parseFloat(v);if(v>=1e9)return"$"+(v/1e9).toFixed(1)+"B";if(v>=1e6)return"$"+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"$"+(v/1e3).toFixed(1)+"K";return"$"+v.toLocaleString()}
function fmt_pct(v){if(v==null)return"—";return(v>0?"+":"")+parseFloat(v).toFixed(1)+"%"}
function pct_cls(v){if(v==null)return"";return v>0?"pos":v<0?"neg":""}
function trunc(a,n){n=n||8;if(!a||a.length<=n*2)return a||"";return a.slice(0,n)+"..."+a.slice(-n)}
function chain_cls(c){c=(c||"").toLowerCase();return["solana","sol","base","ethereum","eth","bsc","bnb","arbitrum","polygon","polygon-pos","avalanche","sui","optimism"].includes(c)?"chain-"+c:""}

fetch("data/tokens.json").then(r=>r.json()).then(data=>{
  const tokens=data.tokens||[];
  const tbody=document.getElementById("tbody");
  tokens.forEach((t,i)=>{
    const score=t.score||0;
    const sc_cls=score>=70?"sc-h":score>=40?"sc-m":"sc-l";
    const addr=t.contract_address||"";
    const tags=(t.positivs||t.positives||[]).slice(0,2).map(p=>`<span class="tag tag-g">${p}</span>`).join("");
    tbody.innerHTML+=`<tr>
  <td>${i+1}</td>
  <td><a href="${t.dex_url || '#' }" target="_blank"><strong>${t.symbol||"???"}</strong></a></td>
  <td><span class="badge ${chain_cls(t.chain||"")}">${t.chain||""}</span></td>
  <td class="mono">${trunc(addr)}</td>
  <td class="sc ${sc_cls}">${score.toFixed(1)}</td>
  <td>${t.channel_count||0}</td>
  <td>${fmt_usd(t.fdv)}</td>
  <td>${fmt_usd(t.volume_h24)}</td>
  <td>${fmt_usd(t.volume_h1)}</td>
  <td class="${pct_cls(t.price_change_h1)}">${fmt_pct(t.price_change_h1)}</td>
  <td class="${pct_cls(t.price_change_h6)}">${fmt_pct(t.price_change_h6)}</td>
  <td>${(t.age_hours||0).toFixed(1)}h</td>
  <td>${t.gmgn_smart_wallets||0}</td>
  <td>${tags}</td>
</tr>`;
  });
  document.getElementById("loading").style.display="none";
  document.getElementById("table-container").style.display="";
  document.getElementById("updated").textContent="Data: "+(data.generated_at_iso||"Unknown");
}).catch(e=>{
  document.getElementById("loading").textContent="Error loading data: "+e.message;
});
</script>
