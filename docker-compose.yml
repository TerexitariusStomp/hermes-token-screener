version: '3.8'

services:
  # FastAPI application
  hermes-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-dashboard
    restart: unless-stopped
    environment:
      - HERMES_HOME=/app
      - PYTHONPATH=/app
      - PORT=8080
    volumes:
      - ./data:/app/.hermes/data
      - ./logs:/app/.hermes/logs
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Caddy reverse proxy (automatic HTTPS with Cloudflare)
  caddy:
    image: caddy:2-alpine
    container_name: hermes-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_EMAIL=${CF_EMAIL:-}
    networks:
      - hermes-network
    depends_on:
      hermes-dashboard:
        condition: service_healthy

networks:
  hermes-network:
    driver: bridge

volumes:
  data:
  logs:
  caddy-data:
  caddy-config:
