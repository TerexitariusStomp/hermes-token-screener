<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hermes Token Screener</title>
<style>
:root{--bg:#0a0e17;--s:#111827;--s2:#1f2937;--b:#374151;--t:#e5e7eb;--t2:#9ca3af;--t3:#6b7280;
--g:#10b981;--r:#ef4444;--y:#f59e0b;--bl:#3b82f6;--p:#8b5cf6;--c:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono','Fira Code',monospace;background:var(--bg);color:var(--t);font-size:13px}
a{color:var(--c);text-decoration:none}
nav{background:var(--s);border-bottom:1px solid var(--b);padding:.6rem 1rem;display:flex;align-items:center;gap:2rem}
.logo{font-size:1rem;font-weight:bold;color:var(--c)}.logo span{color:var(--y)}
.nav{display:flex;gap:1.2rem}.nav a{color:var(--t2);font-size:.8rem;cursor:pointer;padding:.2rem 0;border-bottom:2px solid transparent}.nav a.active{color:var(--c);border-color:var(--c)}
.stats{background:var(--s);border-bottom:1px solid var(--b);padding:.4rem 1rem;display:flex;gap:1.5rem;font-size:.75rem;color:var(--t2);flex-wrap:wrap}
.stats .v{color:var(--t);font-weight:bold}
.wrap{max-width:100%;padding:1rem}
h1{font-size:1.1rem;margin-bottom:.25rem}.sub{color:var(--t2);font-size:.75rem;margin-bottom:.75rem}
.tbl{overflow-x:auto;border:1px solid var(--b);border-radius:6px;max-width:100%}
table{border-collapse:collapse;font-size:.72rem;white-space:nowrap}
th{background:var(--s2);color:var(--t2);text-align:left;padding:.4rem .5rem;font-weight:600;position:sticky;top:0;z-index:2;border-right:1px solid var(--b)}
th:last-child{border-right:none}
td{padding:.35rem .5rem;border-top:1px solid var(--b);border-right:1px solid rgba(55,65,81,.3)}
td:last-child{border-right:none}
tr:hover td{background:var(--s2)}
.sc{font-weight:bold}.sc-h{color:var(--g)}.sc-m{color:var(--y)}.sc-l{color:var(--t2)}
.pos{color:var(--g)}.neg{color:var(--r)}
.badge{display:inline-block;padding:.05rem .3rem;border-radius:3px;font-size:.65rem;font-weight:bold}
.chain-solana{background:#9945ff22;color:#9945ff}.chain-base{background:#0052ff22;color:#0052ff}
.tag{display:inline-block;padding:.05rem .25rem;border-radius:2px;font-size:.6rem;margin:.05rem}
.tag-g{background:#10b98133;color:#10b981}.tag-r{background:#ef444433;color:#ef4444}.tag-y{background:#f59e0b33;color:#f59e0b}
.page{display:none}.page.active{display:block}
.empty{text-align:center;padding:2rem;color:var(--t3)}
@media(max-width:768px){nav{flex-wrap:wrap}.stats{gap:.5rem}}
</style>
</head>
<body>
<nav>
<div class="logo">HERMES <span>&#9670;</span> SCREENER</div>
<div class="nav">
  <a id="nav-tokens" class="active" onclick="showPage('tokens')">Tokens</a>
  <a id="nav-wallets" onclick="showPage('wallets')">Smart Money</a>
</div>
</nav>
<div class="stats" id="stats-bar"><span>Loading...</span></div>

<div class="page active" id="page-tokens"><div class="wrap">
<h1>Token Leaderboard</h1>
<div class="sub" id="tokens-sub"></div>
<div class="tbl"><table id="tokens-table"></table></div>
</div></div>

<div class="page" id="page-wallets"><div class="wrap">
<h1>Smart Money Wallets</h1>
<div class="sub" id="wallets-sub"></div>
<div class="tbl"><table id="wallets-table"></table></div>
</div></div>

<script>
let DATA=null;
const $=s=>document.querySelector(s);

function fmtUsd(v){if(v==null||v===0)return '—';v=parseFloat(v);if(v>=1e9)return '$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return '$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return '$'+(v/1e3).toFixed(1)+'K';return '$'+v.toFixed(0)}
function fmtPct(v){if(v==null)return '—';return (v>0?'+':'')+parseFloat(v).toFixed(1)+'%'}
function fmtBool(v){if(v==null)return '—';return v?'&#10003;':'&#10007;'}
function pctCls(v){if(v==null)return '';return parseFloat(v)>0?'pos':'neg'}
function scCls(s){return s>=70?'sc-h':s>=40?'sc-m':'sc-l'}
function trunc(a,n){if(!a)return '';a=String(a);return a.length>n*2?a.slice(0,n)+'...'+a.slice(-n):a}
function chainCls(c){return c==='solana'||c==='sol'?'chain-solana':c==='base'?'chain-base':''}

function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('#page-'+n).classList.add('active');
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  $('#nav-'+n).classList.add('active');
}

// TOKEN COLUMNS — every enrichment field
const TC=[
  {k:'#',f:(t,i)=>i+1},
  {k:'symbol',f:t=>'<strong>'+(t.symbol||'?')+'</strong>'},
  {k:'chain',f:t=>'<span class="badge '+chainCls(t.chain)+'">'+(t.chain||'')+'</span>'},
  {k:'address',f:t=>'<span style="font-size:.6rem">'+trunc(t.contract_address,8)+'</span>'},
  {k:'score',f:t=>{const s=t.score||0;return '<span class="sc '+scCls(s)+'">'+s.toFixed(1)+'</span>'}},
  {k:'name',f:t=>t.name||''},
  // L0 Dexscreener
  {k:'fdv',f:t=>fmtUsd(t.fdv)},
  {k:'vol24',f:t=>fmtUsd(t.volume_h24)},
  {k:'vol1h',f:t=>fmtUsd(t.volume_h1)},
  {k:'1h%',f:t=>'<span class="'+pctCls(t.price_change_h1)+'">'+fmtPct(t.price_change_h1)+'</span>'},
  {k:'6h%',f:t=>'<span class="'+pctCls(t.price_change_h6)+'">'+fmtPct(t.price_change_h6)+'</span>'},
  {k:'age',f:t=>(t.age_hours||0).toFixed(1)+'h'},
  {k:'channels',f:t=>t.channel_count||0},
  {k:'mentions',f:t=>t.mentions||0},
  // L8 GMGN
  {k:'smart_w',f:t=>t.gmgn_smart_wallets||0},
  {k:'smart_ct',f:t=>t.smart_wallet_count||0},
  {k:'smart_avg',f:t=>(t.smart_wallet_avg_score||0).toFixed(1)},
  {k:'snipers',f:t=>t.sniper_count||0},
  {k:'insiders',f:t=>t.insider_count||0},
  {k:'dev_hold',f:t=>t.gmgn_dev_hold!=null?(t.gmgn_dev_hold?'Yes':'No'):'—'},
  // L9 Telegram
  {k:'tg_ch',f:t=>t.tg_channel_count||0},
  {k:'tg_ment',f:t=>t.tg_mention_count||0},
  {k:'tg_vel',f:t=>(t.tg_mention_velocity||0).toFixed(1)},
  {k:'tg_viral',f:t=>(t.tg_viral_score||0).toFixed(2)},
  {k:'tg_qual',f:t=>(t.tg_channel_quality||0).toFixed(2)},
  {k:'tg_first',f:t=>(t.tg_first_mention_hours_ago||0).toFixed(1)+'h'},
  {k:'tg_last',f:t=>(t.tg_last_mention_minutes_ago||0).toFixed(0)+'m'},
  // L9 Twitter
  {k:'tw_ment',f:t=>t.tw_mention_count||0},
  {k:'tw_sent',f:t=>'<span class="'+pctCls(t.tw_sentiment_score)+'">'+(t.tw_sentiment_score||0).toFixed(2)+'</span>'},
  {k:'tw_trend',f:t=>(t.tw_trending_score||0).toFixed(2)},
  {k:'tw_kol',f:t=>(t.tw_kol_score||0).toFixed(2)},
  {k:'social',f:t=>(t.social_score||0).toFixed(1)},
  // L10 Zerion
          // L11 CoinStats
          // Signals
  {k:'positives',f:t=>(t.positives||[]).slice(0,2).map(p=>'<span class="tag tag-g">'+trunc(p,20)+'</span>').join(' ')},
  {k:'negatives',f:t=>(t.negatives||[]).slice(0,2).map(n=>'<span class="tag tag-r">'+trunc(n,20)+'</span>').join(' ')},
];

function renderTokens(){
  const tokens=DATA.tokens;
  $('#tokens-sub').textContent=`Top ${tokens.length} from ${DATA.total_candidates} candidates · ${DATA.generated_at} · ${TC.length} columns (scroll →)`;
  let html='<thead><tr>';
  TC.forEach(c=>{html+='<th>'+c.k+'</th>'});
  html+='</tr></thead><tbody>';
  tokens.forEach((t,i)=>{
    html+='<tr>';
    TC.forEach(c=>{html+='<td>'+c.f(t,i)+'</td>'});
    html+='</tr>';
  });
  html+='</tbody>';
  $('#tokens-table').innerHTML=html;
}

// WALLET COLUMNS
const WC=[
  {k:'#',f:(w,i)=>i+1},
  {k:'address',f:w=>'<span style="font-size:.6rem">'+trunc(w.address,10)+'</span>'},
  {k:'chain',f:w=>'<span class="badge '+chainCls(w.chain)+'">'+(w.chain||'')+'</span>'},
  {k:'score',f:w=>{const s=w.wallet_score||0;return '<span class="sc '+scCls(s)+'">'+s.toFixed(0)+'</span>'}},
  {k:'pnl',f:w=>'<span class="'+pctCls(w.total_profit)+'">'+fmtUsd(w.total_profit)+'</span>'},
  {k:'real_pnl',f:w=>'<span class="'+pctCls(w.realized_pnl)+'">'+fmtUsd(w.realized_pnl)+'</span>'},
  {k:'unreal_pnl',f:w=>'<span class="'+pctCls(w.unrealized_pnl)+'">'+fmtUsd(w.unrealized_pnl)+'</span>'},
  {k:'roi',f:w=>'<span class="'+pctCls(w.avg_roi)+'">'+fmtPct(w.avg_roi)+'</span>'},
  {k:'win_rate',f:w=>((w.win_rate||0)*100).toFixed(0)+'%'},
  {k:'trades',f:w=>w.total_trades||0},
  {k:'buys',f:w=>w.buy_count||0},
  {k:'sells',f:w=>w.sell_count||0},
  {k:'won',f:w=>(w.tokens_profitable||0)+'/'+(w.tokens_total||0)},
  {k:'entry',f:w=>(w.entry_timing_score||0).toFixed(1)},
  {k:'hold_h',f:w=>(w.avg_hold_hours||0).toFixed(1)},
  {k:'pattern',f:w=>w.trading_pattern||'—'},
  {k:'smart_tag',f:w=>w.smart_money_tag||'—'},
  {k:'tags',f:w=>(w.wallet_tags||'').split(',').filter(t=>t.trim()).map(t=>'<span class="tag '+(t.includes('sniper')||t.includes('insider')?'tag-r':'tag-g')+'">'+t.trim()+'</span>').join(' ')},
  {k:'insider',f:w=>w.insider_flag?'<span class="tag tag-y">Y</span>':'—'},
  {k:'copy',f:w=>w.copy_trade_flag?'<span class="tag tag-r">Y</span>':'—'},
  {k:'rugs',f:w=>w.rug_history_count||0},
  {k:'src_tok',f:w=>trunc(w.source_tokens||'',12)},
  {k:'src_ct',f:w=>w.source_token_count||0},
  {k:'z_value',f:w=>fmtUsd(w.zerion_value)},
  {k:'z_24h',f:w=>'<span class="'+pctCls(w.zerion_24h_change_pct)+'">'+fmtPct(w.zerion_24h_change_pct)+'</span>'},
  {k:'z_defi',f:w=>fmtUsd(w.zerion_defi_value)},
  {k:'dune',f:w=>w.dune_alpha_score||'—'},
  {k:'twitter',f:w=>w.twitter_username||'—'},
  {k:'active',f:w=>{const d=Date.now()/1000-parseFloat(w.last_active_at||0);if(d<60)return Math.floor(d)+'s';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d'}},
  {k:'first_seen',f:w=>{const d=Date.now()/1000-parseFloat(w.first_seen_at||0);if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d'}},
];

function renderWallets(){
  const wallets=DATA.wallets;
  $('#wallets-sub').textContent=`${wallets.length} of ${DATA.wallets_total} wallets · top by score · ${WC.length} columns (scroll →)`;
  let html='<thead><tr>';
  WC.forEach(c=>{html+='<th>'+c.k+'</th>'});
  html+='</tr></thead><tbody>';
  wallets.forEach((w,i)=>{
    html+='<tr>';
    WC.forEach(c=>{html+='<td>'+c.f(w,i)+'</td>'});
    html+='</tr>';
  });
  html+='</tbody>';
  $('#wallets-table').innerHTML=html;
}

// Init
fetch('dashboard_data.json').then(r=>r.json()).then(d=>{
  DATA=d;
  $('#stats-bar').innerHTML=`
    <span>Generated: <span class="v">${d.generated_at}</span></span>
    <span>Tokens: <span class="v">${d.tokens.length}</span></span>
    <span>Candidates: <span class="v">${d.total_candidates.toLocaleString()}</span></span>
    <span>Wallets: <span class="v">${d.wallets_total.toLocaleString()}</span></span>
    <span>Enrichment: <span class="v">13 layers</span></span>
    <span>Token cols: <span class="v">${TC.length}</span></span>
    <span>Wallet cols: <span class="v">${WC.length}</span></span>`;
  renderTokens();
  renderWallets();
}).catch(e=>{ $('#stats-bar').innerHTML='<span class="neg">Error: '+e.message+'</span>'; });
</script>
</body></html>
